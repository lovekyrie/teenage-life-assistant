services:
  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DB_PATH: /app/data/data.db
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      DEV_MOCK_WECHAT: ${DEV_MOCK_WECHAT:-false}
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

volumes:
  sqlite_data:
